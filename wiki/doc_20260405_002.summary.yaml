abstract: 本文档系统阐述了港口自动化码头水平运输核心装备——自动导引车（AGV）的无人化导航与调度技术方案。核心论点在于依托5G通信网络与北斗高精度定位技术，构建高可靠、低延迟的无人物流体系。文档详细说明了AGV采用北斗RTK与激光雷达SLAM融合导航算法，实现厘米级（≤5cm）定位精度，并针对静态与动态障碍物制定了差异化的避障与重规划策略。同时，介绍了基于本地数据中心的统一车队管理系统（FMS），通过5G网络实现高频心跳检测与实时路径分发。主要结论表明，该融合导航架构与集中式调度机制可有效提升港口AGV的运行效率与安全性，为智慧港口数字化转型提供标准化技术指引。
key_points:
- 基于5G与北斗RTK+激光雷达SLAM融合技术实现AGV厘米级高精度定位
- 针对静/动态障碍物采用差异化绕行与停车等待重规划策略
- 依托本地FMS与5G网络实现高频实时通信与集中式路径调度
