abstract: 本报告系统总结了集团公司在生产作业、安全生产与经营管理三大领域的人工智能应用成果，并规划了下一步数字化转型重点工作。在生产领域，通过部署JTOS智能算法、ART机器人及智能理货闸口，实现了调度计划秒级生成与全流程自动化；在安全领域，依托PortGPT-CV大模型实现违章智能识别与闭环管理，显著提升管控精度与效率；在经营领域，构建财务与办公智能助手及专业知识库，推动管理数智化升级。同时，报告强调了夯实算力底座、建设智能体平台与深化数据治理的基础支撑作用。下一步将聚焦高价值场景，推进PortGPT产品化商业化，全面深化"AI+"多场景融合，打造智慧港口新标杆，实现业务效能与数据要素价值的双重释放。
key_points:
- 人工智能在生产调度、安全管控与经营管理领域已实现规模化落地，显著提升作业效率与管理精度。
- 夯实算力底座、构建港口智能体平台与深化数据治理是支撑AI持续创新的核心基础设施。
- 下一步将以高价值场景为切入点，全面推进"AI+"多场景融合与PortGPT产品化商业化，打造智慧港口新生态。
